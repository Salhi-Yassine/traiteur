knpu_oauth2_client:
    clients:
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: auth_google_callback
            redirect_params: {}
            # Stateless = no session needed; we use JWT so sessions are disabled
            use_state: false
